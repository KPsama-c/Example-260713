game_api_url = "http://localhost:15526"
hotkey = "Ctrl+Shift+A"
auto_hide_ms = 8000
overlay_enabled = true

# ── DeepSeek 官方 OpenAI 兼容 ──
# [llm]
# api_style = "openai"
# base_url = "https://api.deepseek.com"
# api_key = "YOUR_KEY"
# model = "deepseek-chat"
# max_tokens = 2000
# timeout_secs = 60

# ── 备选：DeepSeek Anthropic 路径（NF 里 deepseek provider）──
# [llm]
# api_style = "anthropic"
# base_url = "https://api.deepseek.com/anthropic"
# api_key = "YOUR_KEY"
# model = "deepseek-chat"
# max_tokens = 2000
# timeout_secs = 60

