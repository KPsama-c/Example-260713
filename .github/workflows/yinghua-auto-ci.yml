# yinghua-auto：无私钥、不连真站、不安装浏览器
name: yinghua-auto CI

on:
  push:
    paths:
      - "yinghua-auto/**"
      - ".github/workflows/yinghua-auto-ci.yml"
  pull_request:
    paths:
      - "yinghua-auto/**"
      - ".github/workflows/yinghua-auto-ci.yml"

concurrency:
  group: yinghua-auto-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: yinghua-auto
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: yinghua-auto/requirements.txt

      - name: Install
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt
          pip install "pytest>=7" "ruff>=0.4"

      - name: Ruff
        run: ruff check yinghua tests webapp.py main.py nfctl.py

      - name: Pytest
        run: pytest -q
