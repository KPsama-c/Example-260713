# =============================================================================
# 可选高级配置（一般不需要手写）
# 推荐：直接 python main.py → 终端向导会自动生成 config.yaml
# =============================================================================
# 或命令行：
#   python main.py --id 你的classroom_id --list-only
#   python main.py --url "https://www.yuketang.cn/v2/web/studentLog/xxx"
# =============================================================================

course_url: ""
classroom_id: null
# 多课堂：profiles 列表 + active_profile 名称；断点按 classroom:lesson 隔离
# profiles:
#   - name: 课A
#     classroom_id: "YOUR_CLASSROOM_ID"
#     course_url: "https://www.yuketang.cn/v2/web/studentLog/YOUR_CLASSROOM_ID"
# active_profile: 课A
profiles: []
active_profile: ""
prefer_desktop: true

playback_rate: 1.25
playback_rate_min: 0.5
playback_rate_max: 3.0

headless: false
complete_ratio: 0.65
# true=仅平台确认「已观看回放」才写入断点（推荐，避免漏刷）
require_platform_confirm: true
# 本地达线后继续真播并轮询确认的秒数
confirm_grace_sec: 120
# 仍未确认时再往上播的比例（上限 95%）
soft_boost: 0.10
# 单节硬失败额外重试次数
retry_per_lesson: 1
max_watch_sec: 7200

storage_state: "data/storage_state.json"
progress_file: "data/progress.json"
failed_file: "data/failed.json"
soft_file: "data/soft.json"
# 中断进度（未达 complete_ratio 的续播点）
partial_file: "data/partial.json"
# 点「全部」时：仅跳过 soft.json 里已明确达 complete_ratio 的节（本地 0→阈值已跑完）
# partial 中断进度不跳过，只用于续播；无 SOFT 记录 = 不确定 → 重看/续看
# 「仅 SOFT」仍会重试这些节以补平台确认
skip_local_complete_on_all: true
# 打开回放时从 partial 续播（seek 到本机曾观测位置，非伪造心跳）
resume_partial: true
max_videos: 0
wait_login_timeout_sec: 180
screenshot_on_error: true
pause_between_sec: [2, 6]
